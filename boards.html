  <main id="main">
    <section class="lean-hero"><div class="wrap"><div class="eyebrow">News · Collaboration · Q&A</div><h1 class="page-title">소식과 문의</h1><p class="page-summary">새 소식은 공개하고, 문의 내용은 보호합니다.</p><div class="micro-copy"><span>소식 전체 공개</span><span>문의 작성자·관리자만 열람</span><span>관리자 답변</span></div><div class="actions"><button class="btn primary" type="button" id="portal-auth-trigger">로그인</button><a class="btn" href="#write">문의 작성</a></div></div></section>
    <section class="lean-section"><div class="wrap board-shell" data-board-app>
      <div class="board-tabs" aria-label="게시판 선택"><button type="button" class="active" data-board-room="all">전체</button><button type="button" data-board-room="promotion">설탕과소금 소식</button><button type="button" data-board-room="collaboration">협업문의</button><button type="button" data-board-room="qna">질의응답</button></div>
      <form class="board-search" data-board-search><label><span>검색</span><input name="q" type="search" placeholder="제목 또는 주제"></label><button class="btn primary" type="submit">검색</button><button class="btn" type="button" data-board-reset>초기화</button></form>
      <div class="board-status" data-board-status>게시글을 불러오는 중입니다.</div><div class="board-list" data-board-list></div>
      <article class="board-write-card" id="write"><div><div class="eyebrow">Private Message</div><h2>문의 남기기</h2><p class="muted">승인 회원만 작성할 수 있습니다. 본문은 작성자와 관리자에게만 보입니다.</p></div><form class="board-form" data-board-form><label>구분<select name="room" required><option value="collaboration">협업문의</option><option value="qna">질의응답</option><option value="promotion">설탕과소금 소식(관리자)</option></select></label><label>표시 이름<input name="anonymousName" type="text" maxlength="40" placeholder="예: ○○고 교사"></label><label>제목<input name="title" type="text" maxlength="120" required></label><label>내용<textarea name="body" rows="7" required placeholder="필요한 내용과 연락 방법을 적어 주세요."></textarea></label><button class="btn primary" type="submit">등록</button><p class="board-form-note" data-board-form-note></p></form></article>
    </div></section>
