name: Update vocational job feed

on:
  schedule:
    # 09:10, 14:10, 23:10 KST
    - cron: "10 0,5,14 * * *"
    # Backup checks 30 minutes later in case an external source was slow or transiently unavailable.
    - cron: "40 0,5,14 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/job-feed.yml"
      - "tools/fetch_vocational_jobs.mjs"
      - "tools/verify_platform_reliability.mjs"
      - "index.html"
      - "docs/JOB_FEED_AUTOMATION.md"
      - "docs/JOB_FEED_SECRET_SETUP_SIMPLE.md"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: vocational-job-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Check job feed script syntax
        run: node --check tools/fetch_vocational_jobs.mjs

      - name: Build official API job feed
        run: node tools/fetch_vocational_jobs.mjs
        env:
          WORK24_AUTH_KEY: ${{ secrets.WORK24_AUTH_KEY }}
          WORKNET_AUTH_KEY: ${{ secrets.WORKNET_AUTH_KEY }}
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
          MPM_PUBLIC_JOB_SERVICE_KEY: ${{ secrets.MPM_PUBLIC_JOB_SERVICE_KEY }}
          MPM_PUBLIC_JOB_API_URL: ${{ secrets.MPM_PUBLIC_JOB_API_URL }}
          MOEF_PUBLIC_RECRUIT_SERVICE_KEY: ${{ secrets.MOEF_PUBLIC_RECRUIT_SERVICE_KEY }}
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
          JOB_ALIO_API_KEY: ${{ secrets.JOB_ALIO_API_KEY }}
          JOB_ALIO_API_URL: ${{ secrets.JOB_ALIO_API_URL }}
          JOB_ALIO_EXTRA_WATCH_ORGS: ${{ secrets.JOB_ALIO_EXTRA_WATCH_ORGS }}
          NARAILTER_API_KEY: ${{ secrets.NARAILTER_API_KEY }}
          NARAILTER_API_URL: ${{ secrets.NARAILTER_API_URL }}
          MILITARY_RECRUIT_API_KEY: ${{ secrets.MILITARY_RECRUIT_API_KEY }}
          MILITARY_RECRUIT_API_URL: ${{ secrets.MILITARY_RECRUIT_API_URL }}
          JOBKOREA_API_KEY: ${{ secrets.JOBKOREA_API_KEY }}
          JOBKOREA_API_URL: ${{ secrets.JOBKOREA_API_URL }}
          INCRUIT_API_KEY: ${{ secrets.INCRUIT_API_KEY }}
          INCRUIT_API_URL: ${{ secrets.INCRUIT_API_URL }}
          ALBAMON_API_KEY: ${{ secrets.ALBAMON_API_KEY }}
          ALBAMON_API_URL: ${{ secrets.ALBAMON_API_URL }}
          ALBA_API_KEY: ${{ secrets.ALBA_API_KEY }}
          ALBA_API_URL: ${{ secrets.ALBA_API_URL }}
          JOBABA_API_KEY: ${{ secrets.JOBABA_API_KEY }}
          JOBABA_API_URL: ${{ secrets.JOBABA_API_URL }}
          EDU_JOB_CENTER_FEEDS: ${{ secrets.EDU_JOB_CENTER_FEEDS }}
          FINANCE_RECRUIT_FEEDS: ${{ secrets.FINANCE_RECRUIT_FEEDS }}
          LARGE_COMPANY_RECRUIT_FEEDS: ${{ secrets.LARGE_COMPANY_RECRUIT_FEEDS }}
          FINANCE_RECRUIT_API_KEY: ${{ secrets.FINANCE_RECRUIT_API_KEY }}
          LARGE_COMPANY_RECRUIT_API_KEY: ${{ secrets.LARGE_COMPANY_RECRUIT_API_KEY }}
          NONPROFIT_RECRUIT_API_KEY: ${{ secrets.NONPROFIT_RECRUIT_API_KEY }}
          NONPROFIT_RECRUIT_API_URL: ${{ secrets.NONPROFIT_RECRUIT_API_URL }}

      - name: Verify platform reliability gate
        run: node tools/verify_platform_reliability.mjs

      - name: Commit updated feed
        run: |
          if [ -z "$(git status --short -- assets/job-feed.json assets/job-feed-health.json assets/job-attachment-files)" ]; then
            echo "No job feed, health, or attachment changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/job-feed.json
          git add assets/job-feed-health.json
          if [ -d assets/job-attachment-files ]; then
            git add assets/job-attachment-files
          fi
          git commit -m "Update vocational job feed"
          git push

      - name: Commit automation health diagnostics
        if: failure()
        run: |
          if [ -z "$(git status --short -- assets/job-feed-health.json)" ]; then
            echo "No automation health diagnostics to publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/job-feed-health.json
          git commit -m "Record job feed automation diagnostics"
          git push
