name: Update vocational job feed

on:
  schedule:
    # 09:10, 14:10, 19:10 KST
    - cron: "10 0,5,10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check job feed script syntax
        run: node --check tools/fetch_vocational_jobs.mjs

      - name: Build official API job feed
        run: node tools/fetch_vocational_jobs.mjs
        env:
          WORK24_AUTH_KEY: ${{ secrets.WORK24_AUTH_KEY }}
          WORKNET_AUTH_KEY: ${{ secrets.WORKNET_AUTH_KEY }}
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
          JOB_ALIO_API_KEY: ${{ secrets.JOB_ALIO_API_KEY }}
          JOB_ALIO_API_URL: ${{ secrets.JOB_ALIO_API_URL }}
          NARAILTER_API_KEY: ${{ secrets.NARAILTER_API_KEY }}
          NARAILTER_API_URL: ${{ secrets.NARAILTER_API_URL }}
          MILITARY_RECRUIT_API_KEY: ${{ secrets.MILITARY_RECRUIT_API_KEY }}
          MILITARY_RECRUIT_API_URL: ${{ secrets.MILITARY_RECRUIT_API_URL }}
          JOBKOREA_API_KEY: ${{ secrets.JOBKOREA_API_KEY }}
          JOBKOREA_API_URL: ${{ secrets.JOBKOREA_API_URL }}
          INCRUIT_API_KEY: ${{ secrets.INCRUIT_API_KEY }}
          INCRUIT_API_URL: ${{ secrets.INCRUIT_API_URL }}
          ALBAMON_API_KEY: ${{ secrets.ALBAMON_API_KEY }}
          ALBAMON_API_URL: ${{ secrets.ALBAMON_API_URL }}
          ALBA_API_KEY: ${{ secrets.ALBA_API_KEY }}
          ALBA_API_URL: ${{ secrets.ALBA_API_URL }}
          JOBABA_API_KEY: ${{ secrets.JOBABA_API_KEY }}
          JOBABA_API_URL: ${{ secrets.JOBABA_API_URL }}
          EDU_JOB_CENTER_FEEDS: ${{ secrets.EDU_JOB_CENTER_FEEDS }}
          NONPROFIT_RECRUIT_API_KEY: ${{ secrets.NONPROFIT_RECRUIT_API_KEY }}
          NONPROFIT_RECRUIT_API_URL: ${{ secrets.NONPROFIT_RECRUIT_API_URL }}

      - name: Commit updated feed
        run: |
          if git diff --quiet -- assets/job-feed.json; then
            echo "No job feed changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/job-feed.json
          git commit -m "Update vocational job feed"
          git push
